services:

  # ── Zookeeper (required by Kafka) ───────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: hteao-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - hteao-network

  # ── Kafka Broker ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: hteao-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - hteao-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── MySQL Database ───────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hteao-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1
      MYSQL_DATABASE: hteao_db
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hteao-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HTEAO Main App ───────────────────────────────
  hteao-app:
    image: tokiandjack/hteao-07042026:latest
    container_name: hteao-app
    ports:
      - "1972:1972"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hteao_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root1
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: 1972
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - hteao-network
    restart: on-failure

  # ── Kafka Producer ───────────────────────────────
  kafka-producer:
    image: tokiandjack/hteao-kafka-producer:latest
    container_name: hteao-kafka-producer
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_NAME: hteao-topic
      SERVER_PORT: 8082
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hteao-network
    restart: on-failure

  # ── Kafka Consumer ───────────────────────────────
  kafka-consumer:
    image: tokiandjack/hteao-kafka-consumer:latest
    container_name: hteao-kafka-consumer
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: hteao-consumer-group
      KAFKA_TOPIC_NAME: hteao-topic
      SERVER_PORT: 8083
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hteao-network
    restart: on-failure

volumes:
  mysql-data:

networks:
  hteao-network:
    driver: bridge
